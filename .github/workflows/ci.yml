name: Build and Push Docker Image CI

# main 브랜치에 코드가 push 되거나 PR이 merge 될 때 실행됩니다.
on:
  push:
    branches:
      - main
      - master

# 환경 변수로 사용할 이미지 이름 설정
env:
  IMAGE_NAME: mlops-emotion-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. GitHub Repository의 코드를 내려받습니다.
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. 더 빠른 빌드와 캐싱을 위해 Docker Buildx를 세팅합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GitHub Secrets에 저장된 자격 증명을 사용하여 Docker Hub에 로그인합니다.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Docker 이미지를 빌드하고 Docker Hub에 Push 합니다. (빌드 캐시 적용으로 속도 최적화)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    # 빌드 및 푸시 작업이 먼저 성공해야만 실행됩니다.
    needs: build-and-push
    # 등록하신 사용자 컴퓨터(Windows) 환경에서 실행되도록 지정합니다.
    runs-on: self-hosted
    
    steps:
      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Stop and Remove existing container
        # 기존에 실행중인 컨테이너가 없어서 생기는 에러를 무시합니다.
        continue-on-error: true
        run: |
          docker stop ${{ env.IMAGE_NAME }}
          docker rm ${{ env.IMAGE_NAME }}

      - name: Run new container
        run: docker run -d --name ${{ env.IMAGE_NAME }} -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
